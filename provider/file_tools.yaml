identity:
  author: sysam68
  name: file_tools
  label:
    en_US: File Tools
  description:
    en_US: A collection of various tools for handling file object.
    ja_JP: ファイルオブジェクトを扱うためのさまざまなツールのコレクション。
    zh_Hans: 用于处理文件对象的各种工具集合。
    pt_BR: Uma coleção de várias ferramentas para manipular objetos de arquivo.
  icon: icon.svg

tools:
  - tools/dump_to_json/dump_to_json.yaml
  - tools/embed_as_base64/embed_as_base64.yaml
  - tools/get_download_url/get_download_url.yaml
  - tools/save_as_file/save_as_file.yaml
  - tools/save_file_from_url/save_file_from_url.yaml

extra:
  python:
    source: provider/file_tools.py

credentials_for_provider:
  api_base_url:
    type: text-input
    required: false
    label:
      en_US: API Base URL
    placeholder:
      en_US: "https://api.dify.ai/v1"
    help:
      en_US: "Public Dify API base URL used for file uploads. Example: https://api.dify.ai/v1"
  api_uri:
    type: text-input
    required: false
    label:
      en_US: API URI (legacy alias)
    placeholder:
      en_US: "https://api.dify.ai/v1"
    help:
      en_US: Optional legacy alias for API Base URL. Use only if api_base_url is not set.
  api_key:
    type: secret-input
    required: true
    label:
      en_US: API Key
    placeholder:
      en_US: Enter a Dify API key
    help:
      en_US: API key used to call POST /files/upload on the public Dify Files API.
