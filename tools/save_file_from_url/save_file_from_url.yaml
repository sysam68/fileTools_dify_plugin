identity:
  name: save_file_from_url
  author: sysam68
  label:
    en_US: Save File from URL

description:
  human:
    en_US: Download a file from a public or signed URL, upload it to the public Dify Files API, and return the uploaded file object as JSON.
  llm: Download a file from a public or signed URL, upload it to the public Dify Files API, and return the uploaded file object as JSON.

parameters:
  - name: url
    type: string
    label:
      en_US: Source URL
    human_description:
      en_US: Public or signed URL to download before uploading the file to Dify.
    required: true
    form: llm

  - name: user
    type: string
    label:
      en_US: Dify user identifier
    human_description:
      en_US: Optional user identifier sent as the multipart `user` field when calling POST /files/upload. Leave it empty when your Dify instance accepts anonymous file uploads.
    required: false
    default: ""
    form: llm

  - name: filename
    type: string
    label:
      en_US: Override file name
    human_description:
      en_US: Optional explicit file name. If empty, the tool uses Content-Disposition or derives a name from the source response.
    required: false
    default: ""
    form: llm

  - name: mime_type
    type: string
    label:
      en_US: Override MIME type
    human_description:
      en_US: Optional explicit MIME type. If empty, the tool uses the source response Content-Type header or infers the type from the chosen file name.
    required: false
    default: ""
    form: llm

extra:
  python:
    source: tools/save_file_from_url/save_file_from_url.py
