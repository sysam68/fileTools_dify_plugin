identity:
  name: upload_from_url
  author: sysam68
  label:
    en_US: Upload from URL

description:
  human:
    en_US: Download a file from a public or signed URL and return it as a native Dify blob message.
  llm: Download a file from a public or signed URL and return it as a native Dify blob message.

parameters:
  - name: input_file
    type: file
    label:
      en_US: Input file
    human_description:
      en_US: Standard Dify file object. The tool uses its `url` or `remote_url` field as the download source.
    required: false
    form: llm

  - name: url
    type: string
    label:
      en_US: Source URL
    human_description:
      en_US: Optional public or signed URL to download. If omitted, the tool uses `input_file.url` or `input_file.remote_url`.
    required: false
    default: ""
    form: llm

  - name: user
    type: string
    label:
      en_US: Dify user identifier
    human_description:
      en_US: Deprecated and ignored. Kept for backward compatibility.
    required: false
    default: ""
    form: llm

  - name: filename
    type: string
    label:
      en_US: Override file name
    human_description:
      en_US: Optional explicit file name. If empty, the tool uses `input_file.filename`, Content-Disposition, or derives a name from the source response.
    required: false
    default: ""
    form: llm

  - name: mime_type
    type: string
    label:
      en_US: Override MIME type
    human_description:
      en_US: Optional explicit MIME type. If empty, the tool uses `input_file.mime_type`, the source response Content-Type header, or infers the type from the chosen file name.
    required: false
    default: ""
    form: llm

extra:
  python:
    source: tools/upload_from_url/upload_from_url.py
